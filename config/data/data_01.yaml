fashion_gen:
  # this is the location of the hdf5 file for the fashion-gen dataset - this is downloaded dataset from kaggle. But it is the smaller version. There is another version with more high resolution images.
  hdf5_path: /mnt/windows/Users/lordh/Documents/Svalbard/Data/fashion-gen/fashiongen_256_256_train.h5
  # these are the string attributes from the database that we want to capture
  string_attributes: ['input_brand', 'input_category', 'input_composition', 'input_department', 'input_gender', 'input_name', 'input_season', 'input_subcategory', 'input_description']
  # this is the encoding used by the strings in the fashion-gen dataset
  string_codec: latin-1
  # The HDF5 file is a sort of dictionary where each key is a separate dataset. Below is the name of the images dataset.
  images_key: input_image
  # The HDF5 file is a sort of dictionary where each key is a separate dataset. Below is the name of the descriptions dataset.
  descriptions_key: input_description
  # The HDF5 file is a sort of dictionary where each key is a separate dataset. Below is the name of the price (MSRP) dataset.
  prices_key: input_msrpUSD

vector_db:
  # this is where the vector database is stored (qdrant)
  vector_store_path: data/qdrant_multimodal_db
  # this is the name of the collection in qdrant
  collection_name: fashion_gen
  # this is the model used to generated embeddings (multi-modal)
  embedding_model: hf-hub:Marqo/marqo-fashionSigLIP
  # this flag controls if the collection is recreated if it already exists. This will remain true while I have not generated the full collection.
  recreate: true
  # when inserting the embeddings in to qdrant, since they are multi-modal, I am inserting them as named vectors. Below 2 are the names.
  image_vectors_name: images
  text_vectors_name: texts
  # this flag controls whether or not we use Memory Map storage in qdrant (also called on-disk storage) from the start - which is recommended for large collections
  vectors_on_disk: true
  # this flag control if we move the Hnsw graph onto the disk or not
  hnsw_on_disk: true
  # this flag controls if we write the payload onto the disk or keep it in memory (RAM)
  payload_on_disk: true
  # this value controls the number of vectors after which we start building HNSW graphs (20k is default)
  indexing_threshold: 20000

data_processing:
  # this is the dimensionality of the embedding generated by marqo-fashionSigLIP
  embedding_size: 768
  # this is the number of images / texts that are taken in a single batch to generate their embeddings using the embedding model. 512 worked fine.
  embedding_batch_size: 512
  # this is the number of datapoints we fetch at one time from the fashion-gen dataset. Best for it to be some integer multiple of the batch size. Not so large that it does not fit in RAM. Without writing image to payload, the process is really fast.
  data_fetch_batch_size: 1024
  # inserting the entire data into the collection all together seems like it will take time. So I am doing it a few datapoints at a time. This value controls where (the index) we want to start inserting data into the collection from. If this is not 0, please ensure that recreate is false - otherwise the existing collection will get deleted.
  insert_start_index: 0
  # inserting the entire data into the collection all together seems like it will take time. So I am doing it a few datapoints at a time. This value controls where (the index - excluded) we want to stop inserting data into the collection. Ensure that this value is larger than the start index
  insert_stop_index: 100000
